name: Release SummerFlow Desktop

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  windows-x64:
    name: Windows x64 installers and updater
    runs-on: windows-latest
    timeout-minutes: 60
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache Cargo build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install frontend dependencies
        run: npm ci

      - name: Validate release configuration
        run: node scripts/release-check.mjs

      - name: Run automated tests
        run: npm run test

      - name: Type-check and build Web/PWA
        run: npm run build

      - name: Build, sign and publish Tauri bundles
        id: tauri
        uses: tauri-apps/tauri-action@v0.6.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: '夏序 SummerFlow ${{ github.ref_name }}'
          releaseBody: '请查看 CHANGELOG.md 与本 Release 中的安装说明。Windows 安装包尚未接入 Authenticode 代码签名，可能出现 SmartScreen 提示。'
          releaseDraft: false
          prerelease: false
          args: --target x86_64-pc-windows-msvc
          includeUpdaterJson: true
          updaterJsonPreferNsis: true

      - name: Generate updater metadata from signed NSIS artifact
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          New-Item -ItemType Directory -Force updater-metadata | Out-Null
          $release = gh release view "$env:GITHUB_REF_NAME" --json assets | ConvertFrom-Json
          $nsis = @($release.assets | Where-Object { $_.name -match '_x64-setup\.exe$' }) | Select-Object -First 1
          $signature = @($release.assets | Where-Object { $_.name -match '_x64-setup\.exe\.sig$' }) | Select-Object -First 1

          if (-not $nsis -or -not $signature) {
            Write-Host '::error title=Missing signed NSIS updater assets::The Release must contain an NSIS setup.exe and its matching .sig before latest.json can be generated.'
            $release.assets | ForEach-Object { "{0}`t{1} bytes`t{2}" -f $_.name, $_.size, $_.url }
            throw 'Missing signed NSIS updater assets.'
          }

          gh release download "$env:GITHUB_REF_NAME" --pattern $signature.name --dir updater-metadata
          $signaturePath = Join-Path 'updater-metadata' $signature.name
          if (-not (Test-Path -LiteralPath $signaturePath -PathType Leaf)) {
            throw "The updater signature was listed on the Release but could not be downloaded: $($signature.name)"
          }

          $version = (Get-Content -Raw package.json | ConvertFrom-Json).version
          $latest = @{
            version = $version
            notes = 'See CHANGELOG.md for this release.'
            pub_date = [DateTime]::UtcNow.ToString('o')
            platforms = @{
              'windows-x86_64' = @{
                signature = (Get-Content -Raw $signaturePath).Trim()
                url = $nsis.url
              }
            }
          }
          $latest | ConvertTo-Json -Depth 6 | Set-Content -LiteralPath updater-metadata/latest.json -Encoding utf8

      - name: Enrich updater policy metadata
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $metadataPath = 'updater-metadata/latest.json'
          if (-not (Test-Path -LiteralPath $metadataPath -PathType Leaf)) {
            Write-Host '::error title=Missing updater latest.json::The signed NSIS metadata generation step did not create latest.json.'
            Write-Host "Release assets for $env:GITHUB_REF_NAME:"
            gh release view "$env:GITHUB_REF_NAME" --json assets --jq '.assets[] | "\(.name)\t\(.size) bytes\t\(.url)"'
            Write-Host 'Generated files under src-tauri/target:'
            if (Test-Path -LiteralPath 'src-tauri/target') {
              Get-ChildItem -LiteralPath 'src-tauri/target' -Recurse -File |
                ForEach-Object { "$($_.FullName) ($($_.Length) bytes)" }
            } else {
              Write-Host 'src-tauri/target was not generated.'
            }
            throw 'Updater metadata is missing. Check signed NSIS release assets and the metadata generation step.'
          }
          node scripts/enrich-updater-json.mjs updater-metadata/latest.json updater-metadata/latest.json
          gh release upload "$env:GITHUB_REF_NAME" updater-metadata/latest.json --clobber

      - name: Summarize generated artifacts
        shell: pwsh
        run: |
          "## SummerFlow $env:GITHUB_REF_NAME" >> $env:GITHUB_STEP_SUMMARY
          "Tauri artifacts: ${{ steps.tauri.outputs.artifactPaths }}" >> $env:GITHUB_STEP_SUMMARY
          "Updater metadata and signatures were uploaded to the GitHub Release." >> $env:GITHUB_STEP_SUMMARY
